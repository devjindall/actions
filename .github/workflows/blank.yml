name: hello world
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
     - name: build step
       run: echo "demo build"
  test:
    runs-on: macos-latest
    needs: build
    steps:
      - name: test step
        run: echo "demo test"
  deploy:
     runs-on: macos-latest
     needs: test
     steps:
       - name: deploy step
         run: echo "deploy"
       
